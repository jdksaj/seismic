<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>地震仪监控地图</title>

<!-- 高德地图JS -->
<script src="https://webapi.amap.com/maps?v=2.0&key=f72776f86d81aef8dfe32c6aa4b6d7f7"></script>

<style>
html,body,#container{
    width:100%;
    height:100%;
    margin:0;
}
</style>

</head>

<body>

<div id="container"></div>

<script>

// 1. 创建地图
var map = new AMap.Map('container',{
    zoom:5,
    center:[116.397428,39.90923]
});

// 2. 图标
var stationIcon = new AMap.Icon({
    image:"https://jdksaj.github.io/seismic/qq.png",
    size:new AMap.Size(32,32),
    imageSize:new AMap.Size(32,32)
});

// 3. 添加 marker 函数
function addMarkers(devices){
    var markers = [];
    devices.forEach(d => {
        if(d.lng && d.lat){
            var marker = new AMap.Marker({
                position:[d.lng,d.lat],
                title:d.name,
                icon:stationIcon
            });
            marker.setMap(map);
            markers.push(marker);

            // 点击显示站点名称
            var infoWindow = new AMap.InfoWindow({
                content: d.name,
                offset: new AMap.Pixel(0,-30)
            });
            marker.on('click', function(){
                infoWindow.open(map, marker.getPosition());
            });
        }
    });

    // 自动缩放地图，让所有 marker 都可见
    if(markers.length > 0){
        map.setFitView(markers);
    }
}

// 4. fetch 数据
fetch("https://internidal-kathlene-accusatorial.ngrok-free.dev/api/devices")
.then(res => {
    if(!res.ok) throw new Error("HTTP错误 " + res.status);
    return res.json();
})
.then(devices => {
    console.log("获取到设备数据:", devices);
    addMarkers(devices);
})
.catch(err => {
    console.error("加载设备失败:", err);

    // 如果 fetch 失败，使用本地模拟数据测试
    const devices = [
        {"name":"STA001","lng":116.39,"lat":39.9},
        {"name":"STA002","lng":117.2,"lat":39.08},
        {"name":"STA003","lng":121.47,"lat":31.23},
        {"name":"STA003","lng":120.47,"lat":30.23},
        {"name":"STA003","lng":120.47,"lat":38.23}
    ];
    addMarkers(devices);
});

</script>
</body>
</html>
