<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>地震仪监控地图</title>
    <!-- 高德地图 JS SDK -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=f72776f86d81aef8dfe32c6aa4b6d7f7"></script>
    <style>
        html, body, #container {
            width: 100%;
            height: 100%;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="container"></div>

<script>
    // 1. 创建地图
    var map = new AMap.Map('container', {
        zoom: 5,
        center: [116.397428, 39.90923]
    });

    // 2. 图标
    var stationIcon = new AMap.Icon({
        image: "https://jdksaj.github.io/seismic/qq.png", // 自定义图标
        size: new AMap.Size(32, 32),
        imageSize: new AMap.Size(32, 32)
    });

    // 3. 渲染 Marker 函数
    function renderMarkers(devices) {
        if (!devices || devices.length === 0) return;

        var markers = [];
        devices.forEach((d, index) => {
            // 前端给默认 name
            const name = d.name || "站点" + index;

            if (d.lng !== undefined && d.lat !== undefined) {
                var marker = new AMap.Marker({
                    position: [d.lng, d.lat],
                    title: name,
                    icon: stationIcon
                });
                marker.setMap(map);
                markers.push(marker);

                var infoWindow = new AMap.InfoWindow({
                    content: `<div style="padding:5px;">站点: ${name}</div>`,
                    offset: new AMap.Pixel(0, -30)
                });

                marker.on('click', function() {
                    infoWindow.open(map, marker.getPosition());
                });
            }
        });

        // 自动缩放地图，让所有 marker 都可见
        if (markers.length > 0) {
            map.setFitView(markers);
        }
    }

    // 4. 获取数据并渲染
    const apiUrl = "http://106.54.233.158:8080/api/data";

    fetch(apiUrl)
    .then(res => {
        if (!res.ok) throw new Error(`HTTP 状态异常: ${res.status}`);
        return res.json();
    })
    .then(data => {
        console.log("成功获取后端数据:", data);
        renderMarkers(data);
    })
    .catch(err => {
        console.error("地图数据渲染失败:", err);
    });
</script>

</body>
</html>
